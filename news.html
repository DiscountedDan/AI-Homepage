<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dan's AI Learning Hub — News</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base:        #111418;
      --bg-card:        #1a1f26;
      --bg-card-hover:  #1f2630;
      --border:         #2a3140;
      --accent-primary: #3b82f6;
      --text-primary:   #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted:     #64748b;
      --tag-bg:         #0f2744;
      --tag-text:       #60a5fa;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Top Nav ── */
    .top-nav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-link:hover {
      color: var(--text-primary);
    }

    .nav-link.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-primary);
    }

    /* ── Scratchpad Widget ── */
    #scratchpad-widget {
      position: relative;
    }

    .scratchpad-collapsed {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .scratchpad-collapsed:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-primary);
      color: var(--text-primary);
    }

    .scratchpad-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    #scratchpad-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #scratchpad-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 400px;
      height: 300px;
      min-width: 260px;
      min-height: 200px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      z-index: 150;
      display: flex;
      flex-direction: column;
      resize: both;
      overflow: hidden;
    }

    .scratchpad-toolbar {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .scratchpad-fmt-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      padding: 0.2rem 0.45rem;
      line-height: 1;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .scratchpad-fmt-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--border);
      color: var(--text-primary);
    }

    .scratchpad-toolbar-sep {
      flex: 1;
    }

    #scratchpad-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.2rem 0.3rem;
      font-family: inherit;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.12s;
    }

    #scratchpad-close:hover {
      color: var(--text-primary);
    }

    #scratchpad-content {
      flex: 1;
      padding: 0.75rem;
      color: var(--text-primary);
      font-size: 0.88rem;
      font-family: inherit;
      line-height: 1.6;
      outline: none;
      overflow-y: auto;
      min-height: 0;
      text-align: left;
    }

    #scratchpad-content h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0.25rem 0;
    }

    #scratchpad-content font[size="1"] { font-size: 0.7rem; }
    #scratchpad-content font[size="2"] { font-size: 0.82rem; }
    #scratchpad-content font[size="3"] { font-size: 1rem; }
    #scratchpad-content font[size="4"] { font-size: 1.2rem; }
    #scratchpad-content font[size="5"] { font-size: 1.45rem; font-weight: 600; }
    #scratchpad-content font[size="6"] { font-size: 1.75rem; font-weight: 700; }
    #scratchpad-content font[size="7"] { font-size: 2.1rem; font-weight: 700; }

    #scratchpad-content ul {
      padding-left: 1.25rem;
      margin: 0.2rem 0;
    }

    #scratchpad-content li {
      margin-bottom: 0.15rem;
    }

    #scratchpad-content:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── News Feed ── */
    .news-main {
      padding: 2rem 1.5rem 4rem;
      max-width: 780px;
    }

    .feed-section {
      margin-bottom: 2.5rem;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .category-header h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .category-header .divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2em 0.55em;
      border-radius: 4px;
      border: 1px solid #1e3a5f;
      width: fit-content;
    }

    .news-item {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      transition: background 0.15s;
    }

    .news-item:hover {
      background: var(--bg-card-hover);
    }

    .news-item-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .news-item-date {
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .news-item-title {
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.3rem;
    }

    .news-item-summary {
      color: var(--text-secondary);
      font-size: 0.83rem;
      line-height: 1.5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    .skeleton-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .skeleton-badge {
      height: 18px;
      width: 60px;
      border-radius: 4px;
      background: var(--border);
      margin-bottom: 0.4rem;
    }

    .skeleton-title {
      height: 16px;
      width: 75%;
      border-radius: 3px;
      background: var(--border);
      margin-bottom: 0.35rem;
    }

    .skeleton-date {
      height: 12px;
      width: 50px;
      border-radius: 3px;
      background: var(--border);
      margin-bottom: 0.35rem;
    }

    .skeleton-text {
      height: 12px;
      width: 90%;
      border-radius: 3px;
      background: var(--border);
    }

    .feed-error {
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 1rem 0;
    }

    .feed-unavailable {
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 3rem 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding-bottom: 4rem;
    }

    /* ── Hidden utility ── */
    .hidden {
      display: none !important;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .top-nav { height: 42px; }
      .nav-link { font-size: 0.82rem; }
      .news-main { padding: 1.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">

    <!-- ── Scratchpad Widget ── -->
    <div id="scratchpad-widget">
      <button id="scratchpad-toggle" class="scratchpad-collapsed" title="Open scratchpad">
        <span class="scratchpad-icon">&#128221;</span>
        <span id="scratchpad-label">Scratchpad</span>
      </button>
      <div id="scratchpad-panel" class="hidden">
        <div class="scratchpad-toolbar">
          <button type="button" class="scratchpad-fmt-btn" data-action="font-up" title="Increase font size">&#8593;</button>
          <button type="button" class="scratchpad-fmt-btn" data-action="font-down" title="Decrease font size">&#8595;</button>
          <button type="button" class="scratchpad-fmt-btn" data-cmd="insertUnorderedList" title="Bullet list">&#8226;</button>
          <button type="button" class="scratchpad-fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
          <button type="button" class="scratchpad-fmt-btn" data-cmd="justifyLeft" title="Align left"><svg width="12" height="10" viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="1" x2="12" y2="1" stroke="currentColor" stroke-width="1.5"/><line x1="0" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="0" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button type="button" class="scratchpad-fmt-btn" data-cmd="justifyCenter" title="Align center"><svg width="12" height="10" viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="1" x2="12" y2="1" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="0" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button type="button" class="scratchpad-fmt-btn" data-cmd="justifyRight" title="Align right"><svg width="12" height="10" viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="1" x2="12" y2="1" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="5" x2="12" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="0" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <div class="scratchpad-toolbar-sep"></div>
          <button type="button" id="scratchpad-close" title="Close">&#10005;</button>
        </div>
        <div id="scratchpad-content" contenteditable="true" spellcheck="true" data-placeholder="Start typing your notes..."></div>
      </div>
    </div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="news.html" class="nav-link active">News</a>
    </div>

  </nav>

  <main class="news-main" id="feed-area">

    <!-- Section 1: Lab Announcements -->
    <section class="feed-section" id="section-lab">
      <div class="category-header">
        <h2>Lab Announcements</h2>
        <div class="divider"></div>
      </div>
      <div id="openai-items">
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
      </div>
      <div id="googleai-items">
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
      </div>
    </section>

    <!-- Section 2: Industry News -->
    <section class="feed-section" id="section-industry">
      <div class="category-header">
        <h2>Industry News</h2>
        <div class="divider"></div>
      </div>
      <div id="techcrunch-items">
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
        <div class="skeleton-row"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-date"></div><div class="skeleton-text"></div></div>
      </div>
    </section>

  </main>

  <footer>
    <p>Open locally in any browser &mdash; no server required.</p>
  </footer>

  <script>
    // ═══════════════════════════════════════════════════════════
    // SCRATCHPAD
    // ═══════════════════════════════════════════════════════════

    const KEYS = { scratchpad: 'ai_scratchpad' };

    const scratchpadWidget  = document.getElementById('scratchpad-widget');
    const scratchpadToggle  = document.getElementById('scratchpad-toggle');
    const scratchpadPanel   = document.getElementById('scratchpad-panel');
    const scratchpadContent = document.getElementById('scratchpad-content');
    const scratchpadLabel   = document.getElementById('scratchpad-label');
    const scratchpadClose   = document.getElementById('scratchpad-close');

    let scratchpadOpen = false;

    function loadScratchpad() {
      const saved = localStorage.getItem(KEYS.scratchpad);
      if (saved) {
        scratchpadContent.innerHTML = saved;
        updateScratchpadLabel();
      }
    }

    function saveScratchpad() {
      localStorage.setItem(KEYS.scratchpad, scratchpadContent.innerHTML);
      updateScratchpadLabel();
    }

    function updateScratchpadLabel() {
      const text = scratchpadContent.innerText.trim();
      const firstLine = text.split('\n').find(l => l.trim()) || '';
      scratchpadLabel.textContent = firstLine.length > 22
        ? firstLine.slice(0, 22) + '…'
        : (firstLine || 'Scratchpad');
    }

    function openScratchpad() {
      scratchpadPanel.classList.remove('hidden');
      scratchpadOpen = true;
      scratchpadContent.focus();
    }

    function closeScratchpad() {
      scratchpadPanel.classList.add('hidden');
      scratchpadOpen = false;
    }

    scratchpadToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      scratchpadOpen ? closeScratchpad() : openScratchpad();
    });

    scratchpadClose.addEventListener('click', function (e) {
      e.stopPropagation();
      closeScratchpad();
    });

    document.addEventListener('click', function (e) {
      if (scratchpadOpen && !scratchpadWidget.contains(e.target)) {
        closeScratchpad();
      }
    });

    scratchpadContent.addEventListener('input', saveScratchpad);

    document.querySelectorAll('.scratchpad-fmt-btn').forEach(btn => {
      btn.addEventListener('mousedown', e => e.preventDefault());
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const action = this.dataset.action;
        if (action === 'font-up' || action === 'font-down') {
          const current = parseInt(document.queryCommandValue('fontSize')) || 3;
          const next = action === 'font-up' ? Math.min(7, current + 1) : Math.max(1, current - 1);
          document.execCommand('fontSize', false, String(next));
        } else {
          const cmd = this.dataset.cmd;
          const val = this.dataset.val || null;
          document.execCommand(cmd, false, val);
        }
        scratchpadContent.focus();
        saveScratchpad();
      });
    });

    // ═══════════════════════════════════════════════════════════
    // NEWS FEED
    // ═══════════════════════════════════════════════════════════

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(pubDateStr) {
      const date = new Date(pubDateStr);
      const now = new Date();
      const diffMs  = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHrs = Math.floor(diffMs / 3600000);
      if (diffMin < 1)  return 'just now';
      if (diffMin < 60) return diffMin + ' min ago';
      if (diffHrs < 24) return diffHrs + ' hours ago';
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const m = MONTHS[date.getUTCMonth()];
      const d = date.getUTCDate();
      const y = date.getUTCFullYear();
      return y === now.getUTCFullYear() ? m + ' ' + d : m + ' ' + d + ', ' + y;
    }

    function renderItems(items, label) {
      const frag = document.createDocumentFragment();
      items.forEach(function (item) {
        const a = document.createElement('a');
        a.className = 'news-item';
        a.href = item.link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML =
          '<div class="news-item-meta">' +
            '<span class="tag">' + label + '</span>' +
            '<span class="news-item-date">' + formatDate(item.pubDate) + '</span>' +
          '</div>' +
          '<div class="news-item-title">' + esc(item.title) + '</div>' +
          (item.summary ? '<div class="news-item-summary">' + esc(item.summary) + '</div>' : '');
        frag.appendChild(a);
      });
      return frag;
    }

    async function loadNews() {
      var feedArea      = document.getElementById('feed-area');
      var openaiEl      = document.getElementById('openai-items');
      var googleaiEl    = document.getElementById('googleai-items');
      var techcrunchEl  = document.getElementById('techcrunch-items');

      try {
        var res = await fetch('/api/news');
        if (!res.ok) throw new Error('non-200');
        var data = await res.json();

        var lab = data.labAnnouncements;
        var ind = data.industryNews;

        if (lab.openai.status === 'ok' && lab.openai.items.length) {
          openaiEl.innerHTML = '';
          openaiEl.appendChild(renderItems(lab.openai.items, 'OpenAI'));
        } else {
          openaiEl.innerHTML = '<p class="feed-error">Could not load OpenAI items.</p>';
        }

        if (lab.googleai.status === 'ok' && lab.googleai.items.length) {
          googleaiEl.innerHTML = '';
          googleaiEl.appendChild(renderItems(lab.googleai.items, 'Google AI'));
        } else {
          googleaiEl.innerHTML = '<p class="feed-error">Could not load Google AI items.</p>';
        }

        if (ind.techcrunch.status === 'ok' && ind.techcrunch.items.length) {
          techcrunchEl.innerHTML = '';
          techcrunchEl.appendChild(renderItems(ind.techcrunch.items, 'TechCrunch'));
        } else {
          techcrunchEl.innerHTML = '<p class="feed-error">Could not load Industry News.</p>';
        }

        var allFailed =
          lab.openai.status   === 'error' &&
          lab.googleai.status === 'error' &&
          ind.techcrunch.status === 'error';
        if (allFailed) throw new Error('all-failed');

      } catch {
        feedArea.innerHTML = '<p class="feed-unavailable">News unavailable.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadNews);

    // ═══════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════

    loadScratchpad();

  </script>

</body>
</html>
